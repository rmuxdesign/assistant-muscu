<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assistant Muscu Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="app-container">
    <h1>Assistant Muscu</h1>
    
    <div id="setup-zone">
        <label style="text-align: center; display: block; margin-bottom: 10px;">Choisissez votre séance :</label>
        <select id="workout-select"></select>
        <button class="btn-main btn-primary" onclick="startWorkout()">DÉMARRER LA SÉANCE</button>
    </div>

    <div id="workout-zone" class="hidden">
        <div class="header-info">
            <div id="phase-label" class="phase-tag">Phase</div>
            <h2 id="current-exercise" style="margin: 5px 0; font-size: 1.2rem;">Exercice</h2>
            <div id="series-count" style="color: #94a3b8; font-size: 0.9rem;">Série 1 / 4</div>
            <div id="target-info" style="color: #38bdf8; font-weight: bold; font-size: 0.9rem; margin-top: 2px;"></div>
        </div>

        <div id="illustration-container"></div>
        <div id="description-text">Description du mouvement...</div>
        
        <div style="text-align: center;">
            <div id="status-label" style="font-weight: bold; font-size: 0.8rem;">PRÊT ?</div>
            <div id="timer-display" class="timer-idle">00:00</div>
        </div>
        
        <div id="controls">
            <button id="actionBtn" class="btn-main btn-primary" onclick="handleAction()">START EXERCICE</button>
            <button id="stopBtn" class="btn-main btn-danger" onclick="location.reload()">QUITTER</button>
        </div>
        <div id="wakelock-status">Mise en veille active</div>
    </div>
</div>

        { phase: "Échauffement", name: "Hollow hold", reps: "20 sec", series: 1, type: "time", duration: 20, move: "iso", desc: "Dos plaqué au sol. Décollez les épaules et les jambes tendues.[...]

        { phase: "Bloc Force", name: "Ring Face Pull", reps: "12-15 reps", series: 3, type: "reps", move: "pull", desc: "Tirez vers le visage en ouvrant les coudes vers l'extérieur.", img: "http[...]
        { phase: "Finisher", name: "Ring Plank to Pike", reps: "8-10 reps", series: 3, type: "reps", move: "push", desc: "Pieds dans les anneaux, montez les fesses vers le ciel.", img: "https://i[...]
    ],
    "SANS MATÉRIEL": [
        { phase: "Échauffement", name: "Shoulder taps", reps: "20 reps", series: 1, type: "reps", move: "lat", desc: "En planche, touchez l'épaule opposée sans bouger le bassin.", img: "https:[...]
        { phase: "Échauffement", name: "Pompes serrées", reps: "10 reps", series: 1, type: "reps", move: "push", desc: "Mains largeur épaules, coudes collés au corps.", img: "https://images.u[...]
        { phase: "Échauffement", name: "Superman hold", reps: "20 sec", series: 1, type: "time", duration: 20, move: "iso", desc: "Sur le ventre, décollez poitrine et cuisses du sol.", img: "ht[...]
        { phase: "Bloc Force", name: "Pompes tempo", reps: "6-10 reps", series: 4, type: "reps", move: "push", desc: "4s de descente, 1s de pause, remontée explosive.", img: "https://images.unsp[...]
        { phase: "Bloc Force", name: "Pompes hindoues", reps: "6-8 reps", series: 3, type: "reps", move: "push", desc: "Plongez au ras du sol puis redressez le buste vers le ciel.", img: "https:/[...]
        { phase: "Bloc Force", name: "Table Row", reps: "4-6 reps", series: 4, type: "reps", move: "pull", desc: "Tirage horizontal sous une table solide.", img: "https://images.unsplash.com/phot[...]
        { phase: "Bloc Force", name: "Biceps iso", reps: "20 sec", series: 3, type: "time", duration: 20, move: "iso", desc: "Coudes à 90° sous la table, poussez vers le haut.", img: "https://i[...]

        { phase: "Bloc Force", name: "Développé", reps: "8 reps", series: 4, type: "reps", move: "push", desc: "Élastique dans le dos, poussez vers l'avant.", img: "https://images.unsplash.com[...]

    "ANNEAUX + ÉLASTIQUES": [
        { phase: "Échauffement", name: "Band Pull-Apart", reps: "20 reps", series: 1, type: "reps", move: "lat", desc: "Bras tendus, écartez l'élastique au maximum.", img: "https://images.unsp[...]
        { phase: "Bloc Force", name: "Ring Row lourd", reps: "6-8 reps", series: 4, type: "reps", move: "pull", desc: "Tirage horizontal aux anneaux, 3s montée / 3s descente.", img: "https://ima[...]

        { phase: "Finisher", name: "Ring Plank to Pike", reps: "8-10 reps", series: 3, type: "reps", move: "push", desc: "En planche, contractez les abdos pour monter le bassin.", img: "https://i[...]

};

const restImageURL = "https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=500&auto=format&fit=crop&q=60";
let currentWorkout = [];
let exerciseIdx = 0;
let seriesIdx = 1;
let timerInterval;
let currentState = "READY"; 
const restDuration = 60;
let wakeLock = null;

const select = document.getElementById('workout-select');
Object.keys(data).forEach(key => {
    let opt = document.createElement('option');
    opt.value = key; opt.innerHTML = "Séance " + key;
    select.appendChild(opt);
});

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'fr-FR';
    window.speechSynthesis.speak(msg);
}

async function requestWakeLock() {
    if ('wakeLock' in navigator) {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById('wakelock-status').innerText = "🔒 Écran Éveillé";
            document.getElementById('wakelock-status').style.color = "var(--accent)";
        } catch (err) {
            document.getElementById('wakelock-status').innerText = "⚠️ Éco Batterie ?";
        }
    }
}

function startWorkout() {
    currentWorkout = data[select.value];
    exerciseIdx = 0;
    seriesIdx = 1;
    document.getElementById('app-container').classList.add('workout-active');
    document.getElementById('setup-zone').classList.add('hidden');
    document.getElementById('workout-zone').classList.remove('hidden');
    requestWakeLock();
    prepareExercise();
}

function prepareExercise() {
    currentState = "READY";
    const ex = currentWorkout[exerciseIdx];
    document.getElementById('phase-label').innerText = ex.phase;
    document.getElementById('current-exercise').innerText = ex.name;
    document.getElementById('target-info').innerText = "Objectif : " + ex.reps;
    document.getElementById('series-count').innerText = "Série " + seriesIdx + " / " + ex.series;
    document.getElementById('description-text').innerText = ex.desc;
    document.getElementById('status-label').innerText = "PRÊT ?";
    document.getElementById('status-label').style.color = "white";
    document.getElementById('illustration-container').innerHTML = `<img src="${ex.img}" alt="${ex.name}" />`;
    
    const display = document.getElementById('timer-display');
    display.className = "timer-idle";
    display.innerText = (ex.type === "time") ? formatTime(ex.duration) : "GO !";
    document.getElementById('actionBtn').innerText = (ex.type === "time") ? "LANCER" : "TERMINÉ";
    
    speak("Exercice : " + ex.name);
}

function handleAction() {
    const ex = currentWorkout[exerciceIdx];
    if (currentState === "READY") {
        if (ex.type === "time") startTimer(ex.duration, "WORKING");
        else startRest();
    } else if (currentState === "WORKING") startRest(); 
    else if (currentState === "RESTING") nextStep(); 
}

function startTimer(seconds, mode) {
    currentState = mode;
    let timeLeft = seconds;
    const display = document.getElementById('timer-display');
    
    if (mode === "WORKING") {
        display.className = "timer-work";
        document.getElementById('status-label').innerText = "TRAVAIL !";
        document.getElementById('status-label').style.color = "var(--accent)";
        document.getElementById('actionBtn').innerText = "PASSER";
    } else {
        document.getElementById('illustration-container').innerHTML = `<img src="${restImageURL}" alt="Repos" />`;
        display.className = "timer-rest";
        document.getElementById('status-label').innerText = "REPOS";
        document.getElementById('status-label').style.color = "var(--warning)";
        document.getElementById('actionBtn').innerText = "PASSER";
    }

    updateTimerDisplay(timeLeft);
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);
        if (timeLeft <= 3 && timeLeft > 0) speak(timeLeft.toString());
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (mode === "WORKING") startRest();
            else nextStep();
        }
    }, 1000);
}

function startRest() {
    clearInterval(timerInterval);
    speak("Repos.");
    startTimer(restDuration, "RESTING");
}

function nextStep() {
    clearInterval(timerInterval);
    seriesIdx++;
    if (seriesIdx > currentWorkout[exerciseIdx].series) {
        seriesIdx = 1;
        exerciseIdx++;
    }
    if (exerciseIdx >= currentWorkout.length) finishWorkout();
    else prepareExercise();
}

function updateTimerDisplay(s) { document.getElementById('timer-display').innerText = formatTime(s); }
function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

function finishWorkout() {
    document.getElementById('workout-zone').innerHTML = `
        <div class="finish-screen">
            <h2 style="color:var(--accent); text-align:center;">TERMINÉ !</h2>
            <button class="btn-main btn-primary" onclick="location.reload()">RETOUR</button>
        </div>
    `;
    speak("Séance terminée ! Bravo.");
}
</script>

</html>
